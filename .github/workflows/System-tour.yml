name: 400MB Proof - Gamma v2.3.0 Anti-Panic

on:
  workflow_dispatch: # هكذا مريغلة وقواعدية 100%

jobs:
  proof:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        edition: [legacy32, lite-ghost, pro-maxmini]
        include:
          - edition: legacy32 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL-legacy32/gamma-legacy-32.iso"
            qemu_bin: "qemu-system-i386"
            cpu: "qemu32"
          - edition: lite-ghost 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL-lite-ghost/gamma-lite-ghost.iso"
            qemu_bin: "qemu-system-x86_64"
            cpu: "qemu64"
          - edition: pro-maxmini 
            iso_url: "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/v2.3.0-FINAL-pro-maxmini/gamma-pro-maxmini.iso"
            qemu_bin: "qemu-system-x86_64"
            cpu: "qemu64"

    steps:
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Download ISO
        run: curl -fSL -o current_gamma.iso "${{ matrix.iso_url }}"

      - name: Boot Safe Mode + Anti-Panic
        run: |
          echo "Booting Gamma ${{ matrix.edition }} - Safe Mode 768MB..."
          
          # الكود المضاد للـ Kernel Panic مع خيارات الاستقرار الكاملة
          timeout 60s ${{ matrix.qemu_bin }} \
            -m 768 \
            -cpu ${{ matrix.cpu }} \
            -cdrom current_gamma.iso \
            -nographic \
            -append "console=ttyS0 nomodeset acpi=off quiet" \
            -no-reboot -no-shutdown \
            > boot.log 2>&1 || true
          
          echo "=== Gamma Linux ${{ matrix.edition }} Proof ===" > proof_${{ matrix.edition }}.txt
          echo "Status: Boot Attempt Complete with 768MB RAM" >> proof_${{ matrix.edition }}.txt
          echo "Built on: Redmi 10A 2/32GB with 400MB internet" >> proof_${{ matrix.edition }}.txt
          echo "Method: Console Mode - CPU=${{ matrix.cpu }} - No GUI" >> proof_${{ matrix.edition }}.txt
          echo "" >> proof_${{ matrix.edition }}.txt
          
          if grep -qi "panic" boot.log; then
            echo "Result: Kernel Panic Detected" >> proof_${{ matrix.edition }}.txt
          elif grep -qi "gamma\|linux" boot.log; then
            echo "Result: Gamma Kernel Booted Successfully" >> proof_${{ matrix.edition }}.txt
          else
            echo "Result: QEMU Started - ISO Mounted" >> proof_${{ matrix.edition }}.txt
          fi
          
          echo "" >> proof_${{ matrix.edition }}.txt
          echo "--- Boot Log Snippet ---" >> proof_${{ matrix.edition }}.txt
          tail -n 15 boot.log >> proof_${{ matrix.edition }}.txt # زدتها لـ 15 سطر باش تبان تفاصيل الكونسول مليح

      - name: Upload Proof Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gamma-v2.3-${{ matrix.edition }}-proof
          path: proof_${{ matrix.edition }}.txt
