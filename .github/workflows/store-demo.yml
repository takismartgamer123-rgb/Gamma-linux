name: Gamma Store Demo - FINAL REAL 🎥♾️
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'التاق تاع الريليز'
        required: true
        default: 'v2.1-Royal'

permissions:
  contents: write

jobs:
  record-store:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg x11-utils xterm xdotool \
            fonts-noto-color-emoji wget imagemagick fluxbox
          
      - name: Record Store Demo
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 5
          fluxbox &
          sleep 5
          
          # خلفية + xterm
          convert -size 1280x720 xc:#0a0a0a /tmp/bg.png
          display -window root /tmp/bg.png &
          sleep 2
          xterm -geometry 120x35+50+50 -fa 'Monospace' -fs 16 -bg black -fg "#00ff88" -title "GammaTerminal" &
          
          # استنى xterm يبان صح - هذا هو الحل تاع 0.1kbits
          for i in {1..10}; do
            if xdotool search --name "GammaTerminal" >/dev/null 2>&1; then
              echo "xterm found, starting record"
              break
            fi
            echo "Waiting for xterm... $i"
            sleep 1
          done
          
          # فحص أخير
          import -window root /tmp/check.png
          echo "Screenshot size: $(stat -c%s /tmp/check.png) bytes"
          
          # ضرك سجل - الشاشة فيها xterm مضمون
          ffmpeg -f x11grab -video_size 1280x720 -framerate 25 -i :99 \
            -c:v libx264 -preset ultrafast -pix_fmt yuv420p -t 75 gamma-store.mp4 &
          FFMPEG_PID=$!
          sleep 3
          
          # focus على xterm
          xdotool search --name "GammaTerminal" windowactivate
          sleep 1
          
          # السيناريو
          xdotool type "clear"
          xdotool key Return
          sleep 1
          xdotool type "echo '=== Gamma Store Pro v2.2 ==='"
          xdotool key Return
          sleep 1
          xdotool type "echo 'Dedicated to my father Fateh ♾️'"
          xdotool key Return
          sleep 2
          
          xdotool type "wget https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/gamma-store_2.2.0_all.deb"
          xdotool key Return
          sleep 15
          
          xdotool type "sudo apt-get install -y ./gamma-store_2.2.0_all.deb"
          xdotool key Return
          sleep 25
          
          xdotool type "clear && echo 'Launching Gamma Store...' && echo '' && gamma-store"
          xdotool key Return
          sleep 20
          
          xdotool type "echo '' && echo 'Alpha failed. Beta crashed. Gamma survives ♾️'"
          xdotool key Return
          sleep 5
          
          kill $FFMPEG_PID
          sleep 3
          ls -lh gamma-store.mp4
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: gamma-store.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
