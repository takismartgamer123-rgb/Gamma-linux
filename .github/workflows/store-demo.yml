name: Gamma Store Demo Only 🎥
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'التاق تاع الريليز'
        required: true
        default: 'v2.1-Royal'

permissions:
  contents: write

jobs:
  record-store:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg openbox xterm xdotool \
            fonts-noto-color-emoji wget software-properties-common
          
      - name: Record Store Demo - 60 Seconds
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 3
          openbox &
          sleep 2
          
          # خلفية سودة بسيطة
          xsetroot -solid black
          
          # ابدا التسجيل 60 ثانية برك
          ffmpeg -f x11grab -video_size 1280x720 -framerate 25 -i :99 \
            -c:v libx264 -preset ultrafast -t 60 gamma-store.mp4 &
          FFMPEG_PID=$!
          sleep 3
          
          # افتح ترمينال
          xterm -geometry 120x35+0+0 -fa 'Monospace' -fs 16 -bg black -fg white &
          sleep 3
          
          # 1. عنوان
          xdotool type "echo '=== Gamma Store Pro v2.2 ==='"
          xdotool key Return
          sleep 2
          
          # 2. حمل الستور
          xdotool type "wget https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/gamma-store_2.2.0_all.deb"
          xdotool key Return
          sleep 15
          
          # 3. ثبت الستور - هذا حقيقي 100%
          xdotool type "sudo apt-get install -y ./gamma-store_2.2.0_all.deb"
          xdotool key Return
          sleep 20
          
          # 4. شغل الستور - هذا حقيقي 100%
          xdotool type "clear && echo 'Launching Gamma Store...' && gamma-store"
          xdotool key Return
          sleep 15
          
          # النهاية
          kill $FFMPEG_PID
          sleep 2
          ls -lh gamma-store.mp4
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: gamma-store.mp4
          body: |
            ## 🎥 Gamma Store Pro Demo
            
            **60-second install demo:**
            1. Download with `wget`
            2. Install with `apt` 
            3. Launch `gamma-store`
            
            *Alpha failed. Beta crashed. Gamma survives* ♾️  
            *Dedicated to my father Fateh*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
