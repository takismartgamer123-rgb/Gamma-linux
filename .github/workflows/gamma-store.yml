name: Build Gamma Store Pro - With Icon Cache
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Store Version'
        required: true
        default: '2.2.0'
      release_tag:
        description: 'Attach to release tag'
        required: true
        default: 'v2.1-Royal'

permissions:
  contents: write

jobs:
  build-store-pro:
    runs-on: ubuntu-22.04
    steps:
      - name: Create Gamma Store Pro .deb
        run: |
          PKG_NAME="gamma-store"
          PKG_VERSION="${{ github.event.inputs.version }}"
          ARCH="all"
          BUILD_DIR="${PKG_NAME}_${PKG_VERSION}_${ARCH}"
          
          mkdir -p "${BUILD_DIR}/DEBIAN"
          mkdir -p "${BUILD_DIR}/usr/local/bin"
          mkdir -p "${BUILD_DIR}/usr/share/applications"
          
          cat > "${BUILD_DIR}/DEBIAN/control" << EOF
          Package: gamma-store
          Version: ${PKG_VERSION}
          Section: admin
          Priority: optional
          Architecture: all
          Depends: yad (>= 0.40), pkexec, apt, apt-utils, wget, curl, libnotify-bin, dpkg
          Maintainer: Taki <takismartgamer123@gmail.com>
          Description: Gamma Store Pro - Smart App Center with Icon Cache
           Modern software center with APT search, icon caching, and .deb installer.
           Icons download on-demand and cache locally.
           .
           Alpha failed. Beta crashed. Gamma survives.
           Dedicated to my father Fateh.
          EOF
          
          cat > "${BUILD_DIR}/usr/local/bin/gamma-store" << 'STORE_PRO'
          #!/bin/bash
          # Gamma Store Pro v2.2 - With Icon Cache
          # Dedicated to my father Fateh
          
          ICON_CACHE="$HOME/.cache/gamma-store/icons"
          mkdir -p "$ICON_CACHE"
          
          get_icon() {
            local pkg="$1"
            local icon_path="$ICON_CACHE/${pkg}.png"
            
            # 1. لو كاينة في الكاش، استعملها
            [ -f "$icon_path" ] && echo "$icon_path" && return
            
            # 2. فتش في النظام المثبت
            local sys_icon=$(dpkg -L "$pkg" 2>/dev/null | grep -m1 '/icons/.*\.png$\|pixmaps/.*\.png$' | head -1)
            if [ -n "$sys_icon" ] && [ -f "$sys_icon" ]; then
              cp "$sys_icon" "$icon_path"
              echo "$icon_path" && return
            fi
            
            # 3. حمل من debian.org في الخلفية
            wget -q -T 2 -O "$icon_path" "https://screenshots.debian.net/thumbnail/${pkg}" &
            
            # 4. رجع أيقونة افتراضية مؤقتاً
            echo "application-x-deb"
          }
          
          install_package() {
            local pkg="$1"
            local name="$2"
            (
            echo "# 10 Updating package lists..."
            pkexec apt-get update
            echo "# 30 Installing $name..."
            if pkexec apt-get install -y "$pkg" 2>&1; then
              echo "# 90 Configuring..."
              sleep 1
              echo "# 100 Done!"
            else
              echo "# Installation failed!"
              exit 1
            fi
            ) | yad --progress --title="Gamma Store" --text="<b>Installing $name</b>" \
              --percentage=0 --auto-close --width=500 --height=150 \
              --window-icon="software-install" --no-buttons
            
            if [ $? -eq 0 ]; then
              notify-send "Gamma Store" "Installed $name successfully" -i software-install
              yad --info --title="Success" --text="<b>$name installed!</b>\n\nDedicated to my father Fateh" --width=350
            else
              yad --error --title="Error" --text="Failed to install $name" --width=350
            fi
          }
          
          search_packages() {
            local query="$1"
            yad --info --title="Searching..." --text="Searching for: <b>$query</b>\n\nPlease wait..." --timeout=2 --no-buttons &
            
            (
            echo "# 30 Searching repositories..."
            RESULTS=$(apt-cache search "$query" | head -50)
            echo "# 70 Fetching icons..."
            echo "$RESULTS" > /tmp/gamma-search.txt
            echo "# 100 Done!"
            ) | yad --progress --title="Gamma Store Search" --text="Searching + caching icons..." \
              --percentage=0 --auto-close --pulsate --width=400 --height=100 --no-buttons
            
            if [ ! -s /tmp/gamma-search.txt ]; then
              yad --error --title="No Results" --text="No packages found for: <b>$query</b>" --width=350
              return
            fi
            
            FORMATTED=""
            while IFS= read -r line; do
              PKG=$(echo "$line" | cut -d' ' -f1)
              DESC=$(echo "$line" | cut -d' ' -f2- | cut -c1-60)
              ICON=$(get_icon "$PKG")
              FORMATTED="$FORMATTED\nFALSE|$ICON|$PKG|$DESC"
            done < /tmp/gamma-search.txt
            
            SELECTED=$(echo -e "$FORMATTED" | yad --list --checklist --title="Gamma Store - Search Results" \
              --text="<b>Found packages for: $query</b>\nIcons cache to ~/.cache/gamma-store/" \
              --column="Install" --column:IMG="Icon" --column="Package" --column="Description" \
              --width=900 --height=600 --separator=" " --print-column=3 \
              --button="Back:1" --button="Install Selected:0")
            
            if [ $? -eq 0 ] && [ -n "$SELECTED" ]; then
              for pkg in $SELECTED; do
                install_package "$pkg" "$pkg"
              done
            fi
            rm -f /tmp/gamma-search.txt
          }
          
          while true; do
            ACTION=$(yad --form --title="Gamma Store Pro v2.2 - Smart Cache" \
              --text="<b><big>Gamma Store Pro</big></b>\n\n<i>Icons download once, cache forever</i>\n\n<b>Alpha failed. Beta crashed. Gamma survives</b>\n<i>Dedicated to my father Fateh</i>" \
              --image="software-store" --image-on-top \
              --field="Search All Packages:FBTN" "bash -c 'echo search'" \
              --field="Install .deb File:FBTN" "bash -c 'echo deb'" \
              --field="Clear Icon Cache:FBTN" "bash -c 'echo clear'" \
              --field="Featured Apps:FBTN" "bash -c 'echo featured'" \
              --button="Exit:1" --button="About:2" \
              --width=650 --height=550 --center --window-icon="software-store")
            
            EXIT_CODE=$?
            [ $EXIT_CODE -eq 1 ] && exit 0
            [ $EXIT_CODE -eq 2 ] && yad --info --title="About" --text="<b>Gamma Store Pro v2.2</b>\n\nBy: Taki - 17yo from Guelma, Algeria\n\n<b>Smart Features:</b>\n• Icon cache: ~/.cache/gamma-store/\n• Full APT search\n• .deb installer\n\n<i>Maximum Power, Minimum RAM</i>\n\n<b>Dedicated to my father Fateh</b>" --width=450 && continue
            
            CHOICE=$(echo $ACTION | cut -d'|' -f1-3)
            
            if [[ "$CHOICE" == *"search"* ]]; then
              QUERY=$(yad --entry --title="Search Packages" \
                --text="<b>Search Ubuntu Repositories</b>\n\nIcons will cache automatically:" \
                --entry-text="" --width=500)
              [ -n "$QUERY" ] && search_packages "$QUERY"
            
            elif [[ "$CHOICE" == *"deb"* ]]; then
              DEB_FILE=$(yad --file --title="Select .deb Package" \
                --file-filter="Debian Packages | *.deb" --width=600 --height=500)
              [ -n "$DEB_FILE" ] && install_deb "$DEB_FILE"
            
            elif [[ "$CHOICE" == *"clear"* ]]; then
              rm -rf "$ICON_CACHE"
              yad --info --text="Icon cache cleared!\n\nFreed: $(du -sh $ICON_CACHE 2>/dev/null | cut -f1)" --width=350
            
            elif [[ "$CHOICE" == *"featured"* ]]; then
              FEATURED=$(yad --list --checklist --title="Featured Apps" \
                --text="<b>Popular Apps - Icons will cache on first view</b>" \
                --column="Install" --column="App" --column="Category" \
                FALSE "firefox-esr" "Browser" \
                FALSE "chromium" "Browser" \
                FALSE "vlc" "Media" \
                FALSE "gimp" "Graphics" \
                FALSE "libreoffice" "Office" \
                FALSE "code" "Development" \
                --width=700 --height=500 --separator=" " --print-column=2)
              [ -n "$FEATURED" ] && for app in $FEATURED; do install_package "$app" "$app"; done
            fi
          done
          STORE_PRO
          chmod +x "${BUILD_DIR}/usr/local/bin/gamma-store"
          
          cat > "${BUILD_DIR}/usr/share/applications/gamma-store.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Gamma Store Pro
          GenericName=App Center
          Comment=Smart App Center with Icon Cache
          Exec=gamma-store
          Icon=system-software-install
          Terminal=false
          Categories=System;PackageManager;Settings;
          Keywords=store;apps;install;software;search;
          StartupNotify=true
          EOF
          
          dpkg-deb --build "${BUILD_DIR}"
          ls -lh "${PKG_NAME}_${PKG_VERSION}_${ARCH}.deb"
          
      - name: Upload to Release ${{ github.event.inputs.release_tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: gamma-store_${{ github.event.inputs.version }}_all.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
