name: Check Built ISO

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:

      - name: Download Gamma Lite ISO
        uses: actions/download-artifact@v4
        with:
          name: gamma-lite
          path: output

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            squashfs-tools

      - name: Show ISO
        run: |
          echo "===== ISO ====="
          ls -lh output/

      - name: Extract ISO
        run: |
          mkdir iso-root

          xorriso \
            -osirrox on \
            -indev output/gamma-lite.iso \
            -extract / iso-root

          echo "===== ISO TREE ====="
          find iso-root -maxdepth 2 -type f | head -50

      - name: Check Casper Files
        run: |
          echo "===== CASPER ====="

          ls -lh iso-root/casper/

          test -f iso-root/casper/vmlinuz && echo "vmlinuz OK"
          test -f iso-root/casper/initrd.lz && echo "initrd OK"
          test -f iso-root/casper/filesystem.squashfs && echo "squashfs OK"

      - name: Mount SquashFS
        run: |
          sudo mkdir -p /mnt/gamma

          sudo mount \
            -o loop,ro \
            iso-root/casper/filesystem.squashfs \
            /mnt/gamma

      - name: Inspect Root Filesystem
        run: |
          echo "===== ROOT ====="
          ls -la /mnt/gamma | head -50

          echo
          echo "===== INIT ====="
          ls -l /mnt/gamma/sbin/init || true

          echo
          echo "===== SYSTEMD ====="
          ls -l /mnt/gamma/lib/systemd/systemd || true

          echo
          echo "===== OS ====="
          cat /mnt/gamma/etc/os-release || true

          echo
          echo "===== CASPER INSIDE ====="
          ls /mnt/gamma/usr/share/initramfs-tools/scripts/ 2>/dev/null | grep casper || true

      - name: Cleanup
        if: always()
        run: |
          sudo umount /mnt/gamma 2>/dev/null || true
