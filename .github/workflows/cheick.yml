name: Check Initramfs

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      - name: Install debootstrap
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap

      - name: Create chroot
        run: |
          sudo debootstrap \
            --arch=amd64 \
            --include=systemd-sysv \
            jammy \
            chroot \
            http://archive.ubuntu.com/ubuntu

          sudo mount --bind /dev chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys chroot/sys

          echo "nameserver 8.8.8.8" | sudo tee chroot/etc/resolv.conf

      - name: Install core packages
        run: |
          sudo chroot chroot apt-get update

          sudo chroot chroot apt-get install -y \
            linux-image-generic-hwe-22.04 \
            initramfs-tools \
            ubuntu-minimal \
            casper

      - name: Check init system
        run: |
          echo "===== /sbin/init ====="
          sudo chroot chroot ls -l /sbin/init || true

          echo
          echo "===== systemd ====="
          sudo chroot chroot ls -l /lib/systemd/systemd || true

          echo
          echo "===== casper ====="
          sudo chroot chroot dpkg -l | grep casper || true

      - name: Generate initramfs
        run: |
          echo "===== update-initramfs ====="
          sudo chroot chroot update-initramfs -c -k all || true

      - name: Check generated initrd
        run: |
          echo "===== /boot ====="
          sudo chroot chroot ls -lh /boot

          echo
          echo "===== initrd ====="
          sudo chroot chroot ls -lh /boot/initrd* || true

          echo
          echo "===== kernel ====="
          sudo chroot chroot ls -lh /boot/vmlinuz* || true
