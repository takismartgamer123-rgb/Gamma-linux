name: Build Gamma Linux v2.3.0-FINAL ♾️🇩🇿 HYBRID BOOT

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version e.g: v2.3.0'
        required: true
        default: 'v2.3.0-FINAL'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pro-maxmini
            desc: "Gamma Fatih Pro - For 2GB-4GB RAM"
            base_url: https://archive.org/download/bodhi-7.0.0-64/bodhi-7.0.0-64.iso
            ui: "LXQt 1.4"
            base: "ubuntu"
            installer: "ubiquity"
            ram: "2GB+"
          - name: lite-ghost
            desc: "Gamma Lite Ghost - For 1GB RAM"
            base_url: https://archive.org/download/bodhi-7.0.0-64/bodhi-7.0.0-64.iso
            ui: "LXQt 1.4"
            base: "ubuntu"
            installer: "ubiquity"
            ram: "1GB"
          - name: legacy-32
            desc: "Gamma Legacy 32 - For Old PCs"
            base_url: https://downloads.sourceforge.net/project/bodhilinux/7.0.0-beta/bodhi-7.0.0-legacy-beta.iso
            ui: "LXQt 1.4"
            base: "debian"
            installer: "calamares"
            ram: "512MB"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Optimize Workspace Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android /usr/share/swift /usr/local/graalvm /usr/lib/jvm
          sudo docker image prune --all --force
          sudo apt-get clean
          df -h

      - name: Install Development Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso wget rsync zstd isolinux syslinux-utils syslinux-common shim-signed grub-efi-amd64-signed mtools dosfstools

      - name: Fetch Core Media Assets
        run: |
          wget -O gamma-wallpaper.jpg "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920&auto=format&fit=crop" || true
          wget -O gamma-logo.png "https://raw.githubusercontent.com/takismartgamer123-rgb/Gamma-linux/main/assets/logo.png" || true

      - name: Fetch Baseline Source ISO
        run: |
          wget --user-agent="Mozilla/5.0" --referer="https://sourceforge.net" --tries=5 --timeout=60 -O base.iso "${{ matrix.base_url }}"
          mkdir -p base
          sudo mount -o loop base.iso base

      - name: Extract Core Filesystem Structure
        run: |
          if [ -f base/casper/filesystem.squashfs ]; then
            SQUASHFS_PATH="base/casper/filesystem.squashfs"
            SQUASHFS_DIR="casper"
          elif [ -f base/live/filesystem.squashfs ]; then
            SQUASHFS_PATH="base/live/filesystem.squashfs"
            SQUASHFS_DIR="live"
          else
            echo "ERROR: filesystem.squashfs not found"
            find base/ -name "*.squashfs"
            exit 1
          fi
          echo "SQUASHFS_DIR=$SQUASHFS_DIR" >> $GITHUB_ENV
          sudo unsquashfs -f -d squashfs-root "$SQUASHFS_PATH"

      - name: Initialize Isolated Environment Path
        run: |
          sudo rsync -a base/ ext/ --exclude=/${{ env.SQUASHFS_DIR }}/filesystem.squashfs
          sudo rm -rf ext/isolinux ext/boot/isolinux
          sudo mkdir -p ext/boot/isolinux
          sudo cp /usr/lib/ISOLINUX/isolinux.bin ext/boot/isolinux/
          sudo chmod 644 ext/boot/isolinux/isolinux.bin
          sudo rm -rf chroot
          sudo rsync -a --delete squashfs-root/ chroot/
          sudo mount --bind /dev chroot/dev
          sudo mount --bind /run chroot/run
          sudo mount -t proc none chroot/proc
          sudo mount -t sysfs none chroot/sys
          sudo mount -t devpts none chroot/dev/pts
          sudo rm -f chroot/etc/resolv.conf
          echo 'nameserver 8.8.8.8' | sudo tee chroot/etc/resolv.conf

      - name: Configure Package Manager Repositories
        run: |
          sudo chroot chroot bash -c "rm -f /var/lib/apt/lists/lock /var/cache/apt/archives/lock /var/lib/dpkg/lock* /var/lib/dpkg/lock-frontend; rm -rf /var/lib/dpkg/updates/*; dpkg --configure -a || true; apt-get install -f -y || true"
          sudo rm -f chroot/etc/apt/sources.list.d/* || true
          if [ "${{ matrix.base }}" = "ubuntu" ]; then
            sudo tee chroot/etc/apt/sources.list << 'EOF'
          deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-backports main restricted universe multiverse
          EOF
          else
            sudo tee chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          EOF
          fi
          sudo chroot chroot apt-get update -y

      - name: Deploy Custom Desktop Environment
        run: |
          sudo chroot chroot apt-get remove -y --purge moksha* e17* enlightenment* bodhi-artwork bodhi-theme-moksha avahi-daemon cups-pk-helper cups-browsed midori* netsurf* epad* leafpad* terminology* snapd* flatpak* || true
          sudo chroot chroot apt-get autoremove --purge -y || true
          sudo chroot chroot apt-get install -y --no-install-recommends lxqt-core lxqt-themes openbox pcmanfm-qt materia-gtk-theme papirus-icon-theme fonts-noto-core fonts-noto-color-emoji lightdm lightdm-gtk-greeter lxqt-sudo zram-tools preload tlp zenity curl wget adwaita-icon-theme hicolor-icon-theme
          if [ "${{ matrix.installer }}" = "ubiquity" ]; then
            sudo chroot chroot apt-get install -y --no-install-recommends ubiquity ubiquity-frontend-gtk ubiquity-slideshow-ubuntu ubiquity-casper casper
          else
            sudo chroot chroot apt-get install -y --no-install-recommends calamares calamares-settings-debian
          fi
          sudo chroot chroot bash -c "dpkg --configure -a || true; apt-get install -f -y || true"

      - name: Apply System Configurations
        run: |
          sudo chroot chroot bash -c "mkdir -p /etc/lightdm/lightdm.conf.d; echo -e '[Seat:*]\nuser-session=lxqt\nautologin-user=gamma\nautologin-user-timeout=0' > /etc/lightdm/lightdm.conf.d/50-gamma-autologin.conf; useradd -m -s /bin/bash gamma || true; usermod -aG sudo gamma || true; echo 'gamma:gamma' | chpasswd"
          sudo mkdir -p chroot/usr/share/backgrounds chroot/usr/share/pixmaps chroot/usr/share/icons/hicolor/256x256/apps chroot/usr/share/icons/hicolor/48x48/apps
          sudo cp gamma-wallpaper.jpg chroot/usr/share/backgrounds/gamma-wallpaper.jpg || true
          sudo cp gamma-logo.png chroot/usr/share/pixmaps/gamma-logo.png || true
          sudo cp gamma-logo.png chroot/usr/share/icons/hicolor/256x256/apps/gamma-logo.png || true
          sudo cp gamma-logo.png chroot/usr/share/icons/hicolor/48x48/apps/gamma-logo.png || true
          sudo mkdir -p chroot/etc/skel/.config/lxqt
          sudo tee chroot/etc/skel/.config/lxqt/lxqt.conf << 'EOF'
          [General]
          icon_theme=Papirus-Dark
          theme=Gamma-Dark
          [Qt]
          style=Fusion
          EOF
          sudo mkdir -p chroot/etc/skel/Desktop
          if [ "${{ matrix.installer }}" = "ubiquity" ]; then
            sudo tee chroot/etc/skel/Desktop/install-gamma.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Install Gamma Linux
          Exec=pkexec ubiquity gtk_ui
          Icon=gamma-logo
          EOF
          else
            sudo tee chroot/etc/skel/Desktop/install-gamma.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Install Gamma Linux
          Exec=pkexec calamares
          Icon=gamma-logo
          EOF
          fi
          sudo chmod +x chroot/etc/skel/Desktop/install-gamma.desktop

      - name: Provision System Tools
        run: |
          sudo tee chroot/usr/local/bin/gamma-theme << 'EOF'
          #!/bin/bash
          THEME=$1
          if [ "$THEME" = "gamma" ]; then
            pcmanfm-qt --set-wallpaper=/usr/share/backgrounds/gamma-wallpaper.jpg;
            sed -i 's/theme=.*/theme=Gamma-Dark/' ~/.config/lxqt/lxqt.conf;
            sed -i 's/icon_theme=.*/icon_theme=Papirus-Dark/' ~/.config/lxqt/lxqt.conf;
            notify-send "Gamma Linux" "Gamma Theme Activated - Maximum Power";
          elif [ "$THEME" = "king" ]; then
            pcmanfm-qt --set-wallpaper=/usr/share/backgrounds/gamma-wallpaper.jpg;
            sed -i 's/theme=.*/theme=Materia-Dark/' ~/.config/lxqt/lxqt.conf;
            sed -i 's/icon_theme=.*/icon_theme=Papirus-Dark/' ~/.config/lxqt/lxqt.conf;
            notify-send "Gamma Linux" "Royal Theme Activated";
          fi
          EOF
          sudo chmod +x chroot/usr/local/bin/gamma-theme
          sudo tee chroot/usr/local/bin/gamma-setup << 'EOF'
          #!/bin/bash
          zenity --info --title="Gamma Linux Setup" --text="Welcome to Gamma Linux\nUI: LXQt 1.4 Royal Edition\nMaximum Power, Minimum RAM\nAlpha failed. Beta crashed. Gamma survives\nDedicated to my father Fateh" --width=450 --height=300
          BROWSER=$(zenity --list --radiolist --title="Choose Browser" --text="Pick your browser:" --column="Select" --column="Browser" TRUE "falkon" FALSE "firefox-esr" FALSE "chromium" --height=300)
          apt-get update && apt-get install -y --no-install-recommends $BROWSER htop
          zenity --info --title="Setup Complete" --text="Gamma Linux Ready!\n\n- Taki from Guelma, Algeria\nDedicated to my father Fateh" --width=450
          EOF
          sudo chmod +x chroot/usr/local/bin/gamma-setup
          sudo mkdir -p chroot/etc/skel/.config/autostart
          sudo tee chroot/etc/skel/.config/autostart/gamma-setup.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Gamma Setup
          Exec=gamma-setup
          X-GNOME-Autostart-enabled=true
          EOF

      - name: Compress Filesystem Structure
        run: |
          sudo chroot chroot bash -c "apt-get autoremove --purge -y || true; apt-get clean || true"
          sudo chroot chroot rm -rf /var/lib/apt/lists/* /var/cache/apt/* /tmp/* /var/tmp/* /usr/share/doc/* /usr/share/man/* /usr/share/info/*
          sudo umount chroot/dev/pts chroot/dev chroot/run chroot/proc chroot/sys || true
          if [ "${{ env.SQUASHFS_DIR }}" = "casper" ]; then
            sudo rm -f ext/casper/filesystem.squashfs
            sudo mksquashfs chroot ext/casper/filesystem.squashfs -comp zstd -Xcompression-level 15 -b 1M -noappend -no-recovery
            sudo du -sx --block-size=1 chroot | cut -f1 | sudo tee ext/casper/filesystem.size
          else
            sudo rm -f ext/live/filesystem.squashfs
            sudo mksquashfs chroot ext/live/filesystem.squashfs -comp zstd -Xcompression-level 15 -b 1M -noappend -no-recovery
            sudo du -sx --block-size=1 chroot | cut -f1 | sudo tee ext/live/filesystem.size
          fi

      - name: Build Bootloader Architecture - HYBRID FIX
        run: |
          sudo cp /usr/lib/syslinux/modules/bios/*.c32 ext/boot/isolinux/
          cd ext
          dd if=/dev/zero of=efiboot.img bs=1M count=10
          mkfs.vfat efiboot.img
          mmd -i efiboot.img ::/EFI ::/EFI/BOOT
          mcopy -i efiboot.img /usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed ::/EFI/BOOT/BOOTX64.EFI
          cd..
          ls -l ext/efiboot.img

      - name: Compile Target Binary ISO - GOLD
        run: |
          sudo sed -i 's/Bodhi Linux/Gamma Linux v2.3.0-FINAL - Guelma/g' ext/boot/isolinux/isolinux.cfg 2>/dev/null || true
          sudo xorriso -as mkisofs \
            -iso-level 3 -r -V "GAMMA_${{ matrix.name }}" -J -joliet-long \
            -b boot/isolinux/isolinux.bin -c boot/isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e boot/isolinux/efiboot.img -no-emul-boot \ # <--- FIXED PATH
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -o "../gamma-${{ matrix.name }}.iso" \
            ext/
          echo "ISO Built Successfully: gamma-${{ matrix.name }}.iso"
          ls -lh../gamma-${{ matrix.name }}.iso

      - name: Store ISO Artifact Asset
        uses: actions/upload-artifact@v4
        with:
          name: gamma-${{ matrix.name }}
          path: gamma-${{ matrix.name }}.iso
          if-no-files-found: error

  publish-release:
    name: Publish Release v2.3.0-FINAL
    needs: build-release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Gather Target ISO Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Checksum Signatures
        run: |
          mkdir -p release-files
          mv artifacts/*/*.iso release-files/
          cd release-files
          sha256sum *.iso > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Deploy GitHub Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || 'v2.3.0-FINAL' }}
          name: Gamma Linux ${{ github.event.inputs.version || 'v2.3.0-FINAL' }} - HYBRID BOOT
          body: |
            ## Gamma Linux ${{ github.event.inputs.version || 'v2.3.0-FINAL' }} - HYBRID EDITION ♾️🇩🇿
            **Maximum Power, Minimum RAM**
            **BIOS + UEFI Boot = 100% Compatibility**

            **3 Editions:**
            - `Pro-MaxMini` - 2GB+ RAM
            - `Lite-Ghost` - 1GB RAM
            - `Legacy-32` - 512MB RAM

            *Alpha failed. Beta crashed. Gamma survives*
            **By: Taki - 17 Years Old from Guelma, Algeria**
            **Dedicated to my father Fateh**
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
