name: Build Gamma Linux v2.7

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag e.g v2.7'
        required: true
        default: 'v2.7'

permissions:
  contents: write

jobs:

# =====================================
# BUILD
# =====================================

  build:

    runs-on: ubuntu-22.04

    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        edition:
          - pro
          - lite
          - legacy

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    # ================================
    # Free Space
    # ================================

    - name: Free Disk Space
      run: |
        sudo rm -rf \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/share/dotnet \
          /opt/hostedtoolcache/CodeQL || true

        sudo docker system prune -af || true

    # ================================
    # Dependencies
    # ================================

    - name: Install Build Dependencies
      run: |
        sudo apt-get update

        sudo apt-get autoremove -y || true
        sudo apt-get clean || true
        sudo apt-get -f install -y || true

        sudo apt-get install -y \
          libunwind-dev

        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          debootstrap \
          squashfs-tools \
          xorriso \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-efi-ia32-bin \
          mtools \
          dosfstools \
          isolinux \
          syslinux-common \
          qemu-system-x86 \
          ovmf \
          libefl-all-dev

    # ================================
    # Check Environment
    # ================================

    - name: Check Build Environment
      run: |
        cmake --version

        pkg-config --modversion elementary || true
        pkg-config --modversion eina || true
        pkg-config --modversion evas || true

        which grub-mkstandalone
        which xorriso
        which qemu-system-x86_64

    # ================================
    # Build Gamma
    # ================================

    - name: 01 Prepare
      run: |
        bash scripts/01-prepare.sh ${{ matrix.edition }}

    - name: 02 Install Packages
      run: |
        bash scripts/02-install-packages.sh ${{ matrix.edition }}

    - name: 03 Install Gamma Components
      run: |
        bash scripts/03-install-gamma.sh

    - name: 04 Configure System
      run: |
        bash scripts/04-configure.sh ${{ matrix.edition }}

    - name: 05 Build SquashFS
      run: |
        bash scripts/05-build-squashfs.sh ${{ matrix.edition }}

    - name: 06 Build EFI
      run: |
        bash scripts/06-build-efi.sh ${{ matrix.edition }}

    - name: 07 Build ISO
      run: |
        bash scripts/07-build-iso.sh ${{ matrix.edition }}

    - name: 08 QEMU Test
      run: |
        bash scripts/08-test.sh ${{ matrix.edition }}

    # ================================
    # Upload
    # ================================

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: gamma-${{ matrix.edition }}
        path: output/gamma-${{ matrix.edition }}.iso

# =====================================
# RELEASE
# =====================================

  release:

    needs: build

    runs-on: ubuntu-22.04

    steps:

    - name: Download ISO Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: gamma-*
        merge-multiple: true
        path: artifacts

    - name: Show downloaded files
      run: |
        echo "===== RELEASE FILES ====="
        find artifacts -type f

    - name: Create Release
      uses: softprops/action-gh-release@v2

      with:

        tag_name: ${{ github.event.inputs.tag }}

        name: 🚀 Gamma Linux ${{ github.event.inputs.tag }}

        generate_release_notes: true

        body: |
          # 🚀 Gamma Linux ${{ github.event.inputs.tag }}

          ## No PC deserves to die.

          Gamma Linux is a modern Linux distribution built to provide a fast, elegant and lightweight desktop experience for both modern and legacy computers.

          Powered by the Enlightenment Desktop, Gamma Linux focuses on speed, responsiveness and simplicity while keeping resource usage as low as possible.

          ---

          # ✨ Editions

          ## 🚀 Gamma Linux Pro

          The complete Gamma experience.

          ### Features

          - 🎨 Full Gamma UI
          - ⚡ Gamma Control Center (Gamma CC)
          - 🖥 Enlightenment Desktop
          - 🌐 NetworkManager
          - 🎵 Terminology Terminal
          - 🔐 LightDM
          - 🚀 Performance Mode
          - 💙 Gamma iOS Theme
          - 📦 Full Desktop Experience
          - ⚙ Optimized for daily use

          Perfect for:

          - Developers
          - Power Users
          - Content Creators
          - Modern Hardware

          ---

          ## 🍃 Gamma Linux Lite

          Lightweight without sacrificing usability.

          ### Features

          - ⚡ Gamma CC
          - 🖥 Enlightenment Desktop
          - 🎵 Terminology
          - 🔐 LightDM
          - 🚀 Lightweight Package Selection
          - 🧠 Low RAM Usage
          - ⚡ Fast Startup
          - 💙 Gamma Theme

          Perfect for:

          - Older laptops
          - Low-end computers
          - Virtual Machines
          - Everyday computing

          ---

          ## 💻 Gamma Linux Legacy

          Give old computers a second life.

          Based on Debian Bookworm.

          ### Features

          - 🧱 Debian Bookworm Base
          - ⚡ Gamma CC
          - 🖥 Enlightenment Desktop
          - 🎵 Terminology
          - 🌐 NetworkManager
          - 🔐 LightDM
          - 💾 Optimized for older hardware
          - 💿 BIOS Support
          - 💻 UEFI Support
          - 🔥 Maximum Compatibility

          Perfect for:

          - Pentium Systems
          - Core 2 Duo
          - Legacy Laptops
          - Older Desktop PCs

          ---

          # ⭐ Core Features

          - ⚡ Gamma Control Center
          - 🎨 Beautiful Gamma Theme
          - 💙 Gamma iOS Theme
          - 🖥 Enlightenment Desktop
          - 🚀 Fast Boot
          - 🧠 Low Memory Usage
          - 💿 BIOS + UEFI Hybrid Boot
          - 📦 Live ISO
          - 🔥 Performance Optimized
          - ❤️ Open Source

          ---

          # 📥 Downloads

          This release contains:

          - Gamma Linux Pro ISO
          - Gamma Linux Lite ISO
          - Gamma Linux Legacy ISO

          ---

          # ❤️ Support Gamma Linux

          ## ⭐ Star our GitHub repository

          https://github.com/takismartgamer123-rgb/Gamma-linux

          ## 🗳 Vote us on DistroWatch

          https://distrowatch.com/dwres-mobile.php?waitingdistro=1101&resource=links#new

          Every vote helps Gamma Linux reach more users around the world.

          ---

          # 🛠 Technical Information

          Desktop Environment

          - Enlightenment

          Supported Architectures

          - x86_64
          - i686 (Legacy)

          Boot Modes

          - BIOS
          - UEFI
          - Hybrid ISO

          ---

          # 💬 Project Motto

          > **No PC deserves to die.**

        files: |
          artifacts/*.iso

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
