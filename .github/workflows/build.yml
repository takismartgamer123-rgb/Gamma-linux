name: Build Gamma Linux v2.7

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag e.g v2.7'
        required: true
        default: 'v2.7'

permissions:
  contents: write


jobs:

# =====================================
# BUILD
# =====================================

  build:

    runs-on: ubuntu-22.04

    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        edition:
          - pro
          - lite
          - legacy


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    # ================================
    # Dependencies
    # ================================

    - name: Install Build Dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          debootstrap \
          squashfs-tools \
          xorriso \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-efi-ia32-bin \
          mtools \
          dosfstools \
          isolinux \
          syslinux-common \
          qemu-system-x86 \
          libefl-all-dev


    - name: Check EFL Tools
      run: |
        cmake --version
        which edje_cc || true
        edje_cc --version || true


    # ================================
    # Free Space
    # ================================

    - name: Free Disk Space
      run: |
        sudo rm -rf \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/share/dotnet \
          /opt/hostedtoolcache/CodeQL || true

        sudo docker system prune -af || true


    # ================================
    # Build Gamma
    # ================================

    - name: 01 Prepare
      run: |
        bash scripts/01-prepare.sh ${{ matrix.edition }}


    - name: 02 Install Packages
      run: |
        bash scripts/02-install-packages.sh ${{ matrix.edition }}


    - name: 03 Install Gamma Components
      run: |
        bash scripts/03-install-gamma.sh


    - name: 04 Configure System
      run: |
        bash scripts/04-configure.sh ${{ matrix.edition }}


    - name: 05 Build SquashFS
      run: |
        bash scripts/05-build-squashfs.sh


    - name: 06 Build EFI
      run: |
        bash scripts/06-build-efi.sh


    - name: 07 Build ISO
      run: |
        bash scripts/07-build-iso.sh ${{ matrix.edition }}


    - name: 08 QEMU Test
      run: |
        bash scripts/08-test.sh ${{ matrix.edition }}


    # ================================
    # Upload
    # ================================

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: gamma-${{ matrix.edition }}
        path: output/gamma-${{ matrix.edition }}.iso



# =====================================
# RELEASE
# =====================================

  release:

    needs: build

    runs-on: ubuntu-22.04


    steps:

    - name: Download ISO Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts


    - name: Create Release
      uses: softprops/action-gh-release@v2

      with:

        tag_name: ${{ github.event.inputs.tag }}

        name: Gamma Linux ${{ github.event.inputs.tag }}

        body: |
          # Gamma Linux v2.7

          Enlightenment based Linux distribution.

          Editions:

          - Pro: Full desktop edition
          - Lite: Lightweight edition
          - Legacy: 32-bit edition

          Features:

          - Gamma CC
          - Gamma iOS Theme
          - Enlightenment Desktop
          - BIOS + UEFI Boot


        files: |
          artifacts/**/*.iso


      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
