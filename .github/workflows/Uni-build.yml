name: Build Gamma v2.6.3-ZeroBloat ♾️🇩🇿
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version'
        required: true
        default: 'v2.6.3'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          # ============= 1. LEGACY-32 = ZERO BLOAT =============
          - edition: legacy-32
            arch: i386
            base: debian
            packages: "linux-image-686-pae task-standard --no-install-recommends moksha-desktop --no-install-recommends enlightenment_filemanager materia-gtk-theme papirus-icon-theme lightdm slick-greeter network-manager zram-tools tlp calamares zenity kexec-tools dmidecode pciutils gamma-tinygen python3-gi gir1.2-webkit2-4.0"
            zram: "150"
            purge: "locales-all language-pack-*"
            hostname: "gamma-legacy"
            wallpaper: ""
            label: "Gamma Legacy-32 Zero"
            boot_base: "boot=live"
            inst_base: "boot=live autostart=calamares"
          # ============= 2. LITE-GHOST = ZERO BLOAT =============
          - edition: lite-ghost
            arch: amd64
            base: ubuntu
            packages: "linux-image-generic-hwe-22.04 initramfs-tools ubuntu-minimal --no-install-recommends moksha-desktop --no-install-recommends enlightenment_filemanager materia-gtk-theme papirus-icon-theme lightdm slick-greeter network-manager zram-config tlp ubiquity ubiquity-frontend-gtk zenity kexec-tools dmidecode pciutils gamma-tinygen python3-gi gir1.2-webkit2-4.0"
            zram: "50"
            swappiness: "100"
            vfs: "100"
            dirty: "10"
            purge: "snapd* flatpak* cups* printer-driver* bluetooth* geoclue* evolution* gnome-software* locales-all language-pack-*"
            hostname: "gamma-lite"
            wallpaper: "true"
            label: "Gamma Lite-Ghost Zero"
            boot_base: "boot=casper"
            inst_base: "boot=casper only-ubiquity"
          # ============= 3. PRO-MAXMINI = ZERO BLOAT =============
          - edition: pro-maxmini
            arch: amd64
            base: ubuntu
            packages: "linux-image-generic-hwe-22.04 initramfs-tools ubuntu-minimal --no-install-recommends moksha-desktop --no-install-recommends enlightenment_filemanager materia-gtk-theme papirus-icon-theme lightdm slick-greeter network-manager zram-config tlp ubiquity ubiquity-frontend-gtk zenity kexec-tools dmidecode pciutils gamma-tinygen python3-gi gir1.2-webkit2-4.0"
            zram: "25"
            purge: "snapd* flatpak* locales-all language-pack-*"
            hostname: "gamma-pro"
            wallpaper: "true"
            label: "Gamma Pro-MaxMini Zero"
            boot_base: "boot=casper"
            inst_base: "boot=casper only-ubiquity"
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: |
          sudo apt-get update
          if [ "${{ matrix.arch }}" = "i386" ]; then sudo apt-get install -y debootstrap squashfs-tools xorriso wget isolinux syslinux-common grub-pc-bin grub-efi-ia32-bin binutils mtools dosfstools kexec-tools dmidecode pciutils imagemagick convert
          else sudo apt-get install -y debootstrap squashfs-tools xorriso wget rsync zstd isolinux syslinux-common shim-signed grub-efi-amd64-signed mtools dosfstools kexec-tools dmidecode pciutils imagemagick convert
          fi
      - name: Fetch Assets
        if: matrix.wallpaper == 'true'
        run: wget -O gamma-wallpaper.jpg "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920" || true
      - name: Build ISO
        run: |
          set -e
          if [ "${{ matrix.base }}" = "debian" ]; then sudo debootstrap --arch=i386 bookworm chroot http://deb.debian.org/debian/ ; CASPER_DIR="live"; INITRD_NAME="initrd.img"
          else sudo debootstrap --arch=amd64 jammy chroot http://archive.ubuntu.com/ubuntu/ ; CASPER_DIR="casper"; INITRD_NAME="initrd.lz"
          fi
          sudo mount --bind /dev chroot/dev && sudo mount --bind /run chroot/run
          sudo mount -t proc none chroot/proc && sudo mount -t sysfs none chroot/sys
          sudo rm -f chroot/etc/resolv.conf && echo 'nameserver 8.8.8.8' | sudo tee chroot/etc/resolv.conf
          if [ "${{ matrix.base }}" = "ubuntu" ]; then echo "deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse" | sudo tee chroot/etc/apt/sources.list; echo "deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse" | sudo tee -a chroot/etc/apt/sources.list; echo "deb http://archive.ubuntu.com/ubuntu jammy-security main restricted universe multiverse" | sudo tee -a chroot/etc/apt/sources.list; fi
          
          # ZERO BLOAT PACKAGES + 3 LANGUAGES ONLY
          sudo chroot chroot apt-get update
          [ -n "${{ matrix.purge }}" ] && sudo chroot chroot apt-get remove -y --purge ${{ matrix.purge }} || true
          sudo chroot chroot apt-get install -y --no-install-recommends ${{ matrix.packages }}
          sudo chroot chroot locale-gen en_US.UTF-8 ar_DZ.UTF-8 fr_FR.UTF-8
          sudo chroot chroot rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/locale/* /var/cache/apt/*
          sudo chroot chroot apt-get autoremove -y --purge && sudo chroot chroot apt-get clean
          sudo mkdir -p chroot/etc/skel/.e/e/config/standard
          echo 'theme: "Materia-dark"' | sudo tee chroot/etc/skel/.e/e/config/standard/e.cfg
          echo 'icon_theme: "Papirus-Dark"' | sudo tee -a chroot/etc/skel/.e/e/config/standard/e.cfg
          
          # GAMMA TINYGEN ONLY BROWSER
          cat << 'EOFPY' | sudo tee chroot/usr/bin/gamma-tinygen
          #!/usr/bin/env python3
          import gi; gi.require_version('Gtk','3.0'); gi.require_version('WebKit2','4.0')
          from gi.repository import Gtk, WebKit2
          class Browser(Gtk.Window):
              def __init__(self):
                  super().__init__(title="Gamma TinyGen v1.1")
                  self.set_default_size(1000,700)
                  self.header=Gtk.HeaderBar(); self.header.set_show_close_button(True); self.header.props.title="Gamma TinyGen"
                  self.url=Gtk.Entry(); self.url.set_placeholder_text("gamma://home"); self.url.connect("activate",self.load)
                  self.header.pack_start(self.url); self.set_titlebar(self.header)
                  self.web=WebKit2.WebView(); self.web.connect("load-changed",self.on_load)
                  box=Gtk.Box(orientation=Gtk.Orientation.VERTICAL); box.pack_start(self.web,True,True,0); self.add(box)
                  self.load_url("https://duckgo.com")
              def load(self,w): self.load_url(self.url.get_text())
              def load_url(self,u):
                  if not u.startswith(("http","file","gamma")): u="https://"+u
                  self.web.load_uri(u)
              def on_load(self,w,e):
                  if e==WebKit2.LoadEvent.FINISHED: self.url.set_text(self.web.get_uri() or "")
          if __name__=="__main__": w=Browser(); w.connect("destroy",Gtk.main_quit); w.show_all(); Gtk.main()
          EOFPY
          sudo chmod +x chroot/usr/bin/gamma-tinygen
          
          cat << 'EOFDESK' | sudo tee chroot/usr/share/applications/gamma-tinygen.desktop
          [Desktop Entry]
          Name=Gamma TinyGen
          Exec=gamma-tinygen
          Icon=gamma-tinygen
          Type=Application
          Categories=Network;WebBrowser;
          EOFDESK
          
          # Fix for ImageMagick (Must create directory first)
          sudo mkdir -p chroot/usr/share/icons/hicolor/256x256/apps/
          convert -size 256x256 xc:#0a0a1a -fill '#00d4ff' -gravity center -pointsize 140 -annotate +0+20 'TG' chroot/usr/share/icons/hicolor/256x256/apps/gamma-tinygen.png
          sudo chroot chroot xdg-settings set default-web-browser gamma-tinygen.desktop
          
          # SMART INSTALLER
          cat << 'EOFSH' | sudo tee chroot/usr/local/bin/gamma-installer
          #!/bin/bash
          MODE=$(zenity --list --title="Gamma Installer v2.6.3" --text="Choose:" --column="Mode" --column="Desc" "Offline" "3 Languages" "Online" "Add 1 Language" --hide-header --width=500 --height=250)
          if [ "$MODE" = "Online" ] && ping -c 1 google.com &>/dev/null; then zenity --info --text="Internet OK."; fi
          if zenity --question --text="Add 1 Language?"; then LANG_CODE=$(zenity --entry --text="Code: es,de,tr..." --entry-text="es"); [ -n "$LANG_CODE" ] && x-terminal-emulator -e "bash -c 'sudo apt-get update && sudo apt-get install -y language-pack-$LANG_CODE && sudo locale-gen && echo Done.'"; fi
          if [ "${{ matrix.base }}" = "debian" ]; then calamares; else ubiquity --desktop %k; fi
          EOFSH
          sudo chmod +x chroot/usr/local/bin/gamma-installer
          if [ "${{ matrix.base }}" = "ubuntu" ]; then sudo sed -i 's|Exec=ubiquity gtk_ui|Exec=/usr/local/bin/gamma-installer|' chroot/usr/share/applications/ubiquity.desktop; fi
          
          # KERNEL + AUTO-DETECT v2
          KERNEL_VERSION=$(ls chroot/lib/modules/ | head -n 1)
          sudo chroot chroot update-initramfs -c -k "$KERNEL_VERSION"
          sudo mkdir -p chroot/usr/share/initramfs-tools/scripts/casper-bottom/
          cat << 'EOF' | sed "s/CASPER_DIR/$CASPER_DIR/g" | sed "s/INITRD_NAME/$INITRD_NAME/g" | sudo tee chroot/usr/share/initramfs-tools/scripts/casper-bottom/99gamma-auto
          #!/bin/sh
          PREREQ="casper"; prereqs() { echo "$PREREQ"; }
          case $1 in prereqs) prereqs; exit 0;; esac
          if [ "$gamma_auto" = "1" ]; then CMDLINE="quiet splash"
          if lspci -nn | grep -q "8086:0116"; then CMDLINE="i915.enable_psr=0 $CMDLINE"; fi
          if dmidecode -s bios-release-date 2>/dev/null | grep -E "201[0-5]"; then CMDLINE="noapic nolapic acpi=off nomodeset intel_idle.max_cstate=1 i915.enable_psr=0 pci=noacpi irqpoll $CMDLINE"; fi
          if lspci -nn | grep -q "1002:"; then CMDLINE="radeon.modeset=0 $CMDLINE"; fi
          if lspci -nn | grep -q "10de:"; then CMDLINE="nouveau.modeset=0 $CMDLINE"; fi
          if [ ! -f /sys/firmware/efi ]; then CMDLINE="acpi_osi=Linux $CMDLINE"; fi
          if [ "$CMDLINE"!= "quiet splash" ]; then kexec -l /CASPER_DIR/vmlinuz --initrd=/CASPER_DIR/INITRD_NAME --append="gamma.auto=0 $CMDLINE"; kexec -e; fi
          fi
          EOF
          sudo chmod +x chroot/usr/share/initramfs-tools/scripts/casper-bottom/99gamma-auto
          sudo chroot chroot update-initramfs -c -k "$KERNEL_VERSION"
          
          # ZRAM
          if [ "${{ matrix.base }}" = "debian" ]; then echo "ZRAM_SIZE_PERCENT=${{ matrix.zram }}" | sudo tee chroot/etc/default/zramswap
          else echo -e '#!/bin/sh\n/sbin/modprobe zram\necho $(($(sysctl -n vm.totalhigh_pages) * 4096 * '${{ matrix.zram }}' / 100)) > /sys/block/zram0/disksize\n/sbin/mkswap /dev/zram0\n/sbin/swapon -p 32767 /dev/zram0' | sudo tee chroot/etc/rc.local; sudo chmod +x chroot/etc/rc.local; fi
          [ -n "${{ matrix.swappiness }}" ] && echo "vm.swappiness=${{ matrix.swappiness }}" | sudo tee chroot/etc/sysctl.d/99-zram.conf
          [ -n "${{ matrix.vfs }}" ] && echo "vm.vfs_cache_pressure=${{ matrix.vfs }}" | sudo tee -a chroot/etc/sysctl.d/99-zram.conf
          [ -n "${{ matrix.dirty }}" ] && echo "vm.dirty_ratio=${{ matrix.dirty }}" | sudo tee -a chroot/etc/sysctl.d/99-zram.conf
          
          # USER
          sudo chroot chroot systemctl disable NetworkManager-wait-online.service || true
          sudo chroot chroot bash -c "useradd -m -s /bin/bash gamma || true; echo 'gamma:gamma' | chpasswd; echo ${{ matrix.hostname }} > /etc/hostname"
          [ "${{ matrix.wallpaper }}" = "true" ] && sudo mkdir -p chroot/usr/share/backgrounds && sudo cp gamma-wallpaper.jpg chroot/usr/share/backgrounds/gamma-wallpaper.jpg
          
          # ISO BUILD DIRECTORIES (Dual-Case UEFI + Consolidated Isolinux)
          VMLINUZ_FILE=$(sudo sh -c "ls chroot/boot/vmlinuz-* | head -n 1")
          INITRD_FILE=$(sudo sh -c "ls chroot/boot/$INITRD_NAME-* | head -n 1")
          sudo umount chroot/dev chroot/run chroot/proc chroot/sys || true
          
          ISO_DIR="iso"
          mkdir -p $ISO_DIR/$CASPER_DIR $ISO_DIR/boot/isolinux $ISO_DIR/boot/grub $ISO_DIR/EFI/BOOT $ISO_DIR/efi/boot
          
          sudo mksquashfs chroot $ISO_DIR/$CASPER_DIR/filesystem.squashfs -comp zstd -Xcompression-level 22 -b 1M -noappend
          sudo cp "$VMLINUZ_FILE" $ISO_DIR/$CASPER_DIR/vmlinuz
          sudo cp "$INITRD_FILE" $ISO_DIR/$CASPER_DIR/$INITRD_NAME
          
          # Splash image in correct isolinux folder
          convert -size 800x600 xc:#0a0a1a -font DejaVu-Sans-Bold -pointsize 56 -fill '#00d4ff' -gravity center -annotate +0-80 'Gamma Linux' -pointsize 28 -fill white -annotate +0+40 'v2.6.3 Zero' $ISO_DIR/boot/isolinux/splash.png || true
          
          # Fix Isolinux (All files grouped together = no load errors)
          sudo cp /usr/lib/ISOLINUX/isolinux.bin $ISO_DIR/boot/isolinux/
          for f in menu.c32 vesamenu.c32 ldlinux.c32 libutil.c32 libcom32.c32; do sudo cp /usr/lib/syslinux/modules/bios/$f $ISO_DIR/boot/isolinux/ 2>/dev/null || true; done
          
          # Legacy Isolinux config
          echo "UI vesamenu.c32 MENU RESOLUTION 800 600 MENU BACKGROUND /boot/isolinux/splash.png MENU TITLE ${{ matrix.label }} v2.6.3 TIMEOUT 100 DEFAULT autodetect LABEL autodetect MENU LABEL ^Gamma Auto-Detect KERNEL /$CASPER_DIR/vmlinuz APPEND initrd=/$CASPER_DIR/$INITRD_NAME ${{ matrix.boot_base }} quiet splash gamma.auto=1 LABEL install MENU LABEL ^Install Gamma OS KERNEL /$CASPER_DIR/vmlinuz APPEND initrd=/$CASPER_DIR/$INITRD_NAME ${{ matrix.inst_base }} quiet splash gamma.auto=1 LABEL safe MENU LABEL ^Safe Graphics KERNEL /$CASPER_DIR/vmlinuz APPEND initrd=/$CASPER_DIR/$INITRD_NAME ${{ matrix.boot_base }} nomodeset quiet splash" | sudo tee $ISO_DIR/boot/isolinux/isolinux.cfg
          
          # Dynamic GRUB Config (Ventoy/Rufus Universal Fix - added "search --set=root")
          echo "set timeout=10 set default=0 set gfxmode=800x600 insmod all_video insmod gfxterm terminal_output gfxterm background_image /boot/isolinux/splash.png menuentry 'Gamma Auto-Detect' { search --no-floppy --set=root --file /$CASPER_DIR/vmlinuz; linux /$CASPER_DIR/vmlinuz ${{ matrix.boot_base }} quiet splash gamma.auto=1 initrd /$CASPER_DIR/$INITRD_NAME } menuentry 'Install Gamma OS' { search --no-floppy --set=root --file /$CASPER_DIR/vmlinuz; linux /$CASPER_DIR/vmlinuz ${{ matrix.inst_base }} quiet splash gamma.auto=1 initrd /$CASPER_DIR/$INITRD_NAME } menuentry 'Safe Graphics' { search --no-floppy --set=root --file /$CASPER_DIR/vmlinuz; linux /$CASPER_DIR/vmlinuz ${{ matrix.boot_base }} nomodeset quiet splash initrd /$CASPER_DIR/$INITRD_NAME }" | sudo tee $ISO_DIR/boot/grub/grub.cfg
          
          # Copy GRUB config to CAPS and Small cases for universal strict UEFI
          sudo cp $ISO_DIR/boot/grub/grub.cfg $ISO_DIR/EFI/BOOT/GRUB.CFG
          sudo cp $ISO_DIR/boot/grub/grub.cfg $ISO_DIR/efi/boot/grub.cfg
          
          # Auto-Detect EFI Binary generation for 32bit and 64bit
          if [ "${{ matrix.arch }}" = "i386" ]; then 
            sudo grub-mkimage -O i386-efi -o $ISO_DIR/EFI/BOOT/BOOTIA32.EFI -p /boot/grub iso9660 fat extcmd boot linux normal configfile search search_fs_file search_fs_uuid search_label
            sudo cp $ISO_DIR/EFI/BOOT/BOOTIA32.EFI $ISO_DIR/efi/boot/bootia32.efi
            EFI_FILE="EFI/BOOT/BOOTIA32.EFI"
          else 
            cp /usr/lib/shim/shimx64.efi.signed $ISO_DIR/EFI/BOOT/BOOTX64.EFI || cp /usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed $ISO_DIR/EFI/BOOT/BOOTX64.EFI
            cp $ISO_DIR/EFI/BOOT/BOOTX64.EFI $ISO_DIR/efi/boot/bootx64.efi
            EFI_FILE="EFI/BOOT/BOOTX64.EFI"
          fi
          
          # Final Xorriso command with GPT-BASDAT for maximum compatibility
          sudo xorriso -as mkisofs -iso-level 3 -r -V "GAMMA_${{ matrix.edition }}" -J -joliet-long -b boot/isolinux/isolinux.bin -c boot/isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -eltorito-alt-boot -e $EFI_FILE -no-emul-boot -isohybrid-gpt-basdat -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin -o "gamma-${{ matrix.edition }}.iso" $ISO_DIR
      - uses: actions/upload-artifact@v4
        with:
          name: gamma-${{ matrix.edition }}
          path: gamma-${{ matrix.edition }}.iso
  release:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        edition: [legacy-32, lite-ghost, pro-maxmini]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gamma-${{ matrix.edition }}
      - name: Generate SHA256
        run: sha256sum gamma-${{ matrix.edition }}.iso > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ matrix.edition }}
          name: ${{ matrix.edition }} ${{ github.event.inputs.version }} ♾️🇩🇿
          body: |
            ## ${{ matrix.edition }} ${{ github.event.inputs.version }} ♾️🇩🇿
            **Zero Bloat Edition: User is Free**
            **Ubuntu Minimal + Moksha + Enlightenment**
            **32bit = Debian | 64bit = Ubuntu**
            **Auto-Detect v2: No manual GPU fix needed**
          files: |
            gamma-${{ matrix.edition }}.iso
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
