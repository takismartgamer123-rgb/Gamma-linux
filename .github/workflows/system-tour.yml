name: Record Gamma Demo - VirtualBox 🎥♾️
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'التاق تاع الريليز'
        required: true
        default: 'v2.1-Royal'
      store_deb_name:
        description: 'اسم ملف .deb تاع الستور'
        required: true
        default: 'gamma-store_2.2.0_all.deb'

permissions:
  contents: write

jobs:
  record-vbox:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        iso: [gamma-legacy-32, gamma-lite-ghost, gamma-pro-maxmini]
    steps:
      - name: Install VirtualBox + FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y virtualbox virtualbox-ext-pack ffmpeg xvfb xdotool
          
      - name: Download ISO ${{ matrix.iso }}
        run: |
          wget -O gamma.iso "https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/${{ matrix.iso }}.iso"
          ls -lh gamma.iso
          
      - name: Create VM + Record 3min
        run: |
          VM_NAME="gamma-${{ matrix.iso }}"
          
          # 1. انشاء VM
          VBoxManage createvm --name "$VM_NAME" --ostype Ubuntu_64 --register
          VBoxManage modifyvm "$VM_NAME" --memory 3072 --vram 128 --cpus 2
          VBoxManage modifyvm "$VM_NAME" --nic1 nat --graphicscontroller vmsvga
          VBoxManage modifyvm "$VM_NAME" --accelerate3d off
          
          # 2. هارد ديسك + ISO
          VBoxManage createmedium disk --filename "$VM_NAME.vdi" --size 15000
          VBoxManage storagectl "$VM_NAME" --name "SATA" --add sata --controller IntelAhci
          VBoxManage storageattach "$VM_NAME" --storagectl "SATA" --port 0 --device 0 --type hdd --medium "$VM_NAME.vdi"
          VBoxManage storageattach "$VM_NAME" --storagectl "SATA" --port 1 --device 0 --type dvddrive --medium gamma.iso
          
          # 3. شغل VM في الخلفية
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 3
          VBoxManage startvm "$VM_NAME" --type headless &
          sleep 90 # إقلاع
          
          # 4. ابدا التسجيل - VirtualBox يعرض ديركت في :99
          ffmpeg -f x11grab -video_size 1280x720 -i :99 -framerate 30 -c:v libx264 -preset ultrafast -t 180 ${{ matrix.iso }}-vbox-demo.mp4 &
          FFMPEG_PID=$!
          sleep 5
          
          # 5. السيناريو: ترمينال + تثبيت + ستور
          # 0:00-0:10 ترمينال
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1d 38  # Ctrl+Alt+T
          sleep 3
          VBoxManage controlvm "$VM_NAME" keyboardputstring "clear"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c # Enter
          sleep 1
          VBoxManage controlvm "$VM_NAME" keyboardputstring "echo '=== Gamma Linux ${{ matrix.iso }} ==='"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c
          sleep 3
          
          # 0:10-1:00 wget + apt install
          VBoxManage controlvm "$VM_NAME" keyboardputstring "wget https://github.com/takismartgamer123-rgb/Gamma-linux/releases/download/${{ github.event.inputs.release_tag }}/${{ github.event.inputs.store_deb_name }}"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c
          sleep 15
          
          VBoxManage controlvm "$VM_NAME" keyboardputstring "sudo apt-get install -y ./{{ github.event.inputs.store_deb_name }}"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c
          sleep 20
          
          # 1:00-3:00 شغل الستور واستعملو
          VBoxManage controlvm "$VM_NAME" keyboardputstring "gamma-store"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c
          sleep 10
          
          # Tab + Search + vlc
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 0f 1c  # Tab Enter
          sleep 2
          VBoxManage controlvm "$VM_NAME" keyboardputstring "vlc"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c
          sleep 15
          
          # Install
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 0f 39 0f 0f 1c # Tab Space Tab Tab Enter
          sleep 20
          
          # Outro
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 38 3e # Alt+F4
          sleep 2
          VBoxManage controlvm "$VM_NAME" keyboardputstring "echo 'Alpha failed. Beta crashed. Gamma survives'"
          VBoxManage controlvm "$VM_NAME" keyboardputscancode 1c
          sleep 10
          
          wait $FFMPEG_PID
          VBoxManage controlvm "$VM_NAME" poweroff
          ls -lh ${{ matrix.iso }}-vbox-demo.mp4
          
      - name: Upload Video
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ matrix.iso }}-vbox-demo.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
